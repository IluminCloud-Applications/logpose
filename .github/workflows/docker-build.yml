name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ilumincloud-applications/logpose

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Delete old package versions (keep last 2)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const packageName = 'logpose';
            const org = 'ilumincloud-applications';

            const { data: versions } = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
              package_type: 'container',
              package_name: packageName,
              org: org,
              per_page: 100,
            });

            // Sort by created_at descending (newest first)
            const sorted = versions.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at)
            );

            // Keep the 2 most recent, delete the rest
            const toDelete = sorted.slice(2);

            for (const version of toDelete) {
              console.log(`Deleting version ${version.id} (${version.name}) created at ${version.created_at}`);
              await github.rest.packages.deletePackageVersionForOrg({
                package_type: 'container',
                package_name: packageName,
                org: org,
                package_version_id: version.id,
              });
            }

            console.log(`Kept ${Math.min(sorted.length, 2)} version(s), deleted ${toDelete.length} old version(s).`);
